# ─────────────────────────────────────────────────────────────────
# vhost brennerogru.it — replica della config REALE del vecchio server.
# Il sito è un'app Nuxt 3 SSR che gira come processo Node su 127.0.0.1:3000
# (gestito da pm2). nginx fa solo da reverse proxy + TLS.
#
# Questo file è la versione HTTP "pre-certbot": copiarlo in
# /etc/nginx/sites-available/brennerogru, abilitarlo, poi lanciare
#   certbot --nginx -d brennerogru.it -d www.brennerogru.it \
#           -d brennerogru.com -d www.brennerogru.com
# che aggiunge in automatico il blocco 443 e il redirect 80→443.
# (Includere i domini .com solo se anch'essi vengono spostati — vedi MIGRATION.md)
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name brennerogru.it www.brennerogru.it brennerogru.com www.brennerogru.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # WebSocket / HMR passthrough
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
