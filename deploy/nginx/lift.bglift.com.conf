# Reverse proxy per la webapp BGLift 3D → container Node su 127.0.0.1:3001.
# Copiare in /etc/nginx/sites-available/ e linkare in sites-enabled/.
#
# Ordine consigliato:
#   1) deploy solo blocco :80 (senza SSL) per far passare la challenge ACME
#   2) certbot --nginx -d lift.bglift.com  (aggiunge/gestisce i blocchi 443)
# In alternativa usare direttamente questo file dopo aver emesso il certificato.

server {
    listen 80;
    listen [::]:80;
    server_name lift.bglift.com;

    # Challenge Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lift.bglift.com;

    ssl_certificate     /etc/letsencrypt/live/lift.bglift.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lift.bglift.com/privkey.pem;

    # Upload modelli GLB fino a 100 MB (limite multer) → margine a 120M.
    client_max_body_size 120M;

    # File statici serviti direttamente dal Node (dist/): cache lunga sugli asset
    # con hash. Il proxy passa tutto all'app, che gestisce anche la SPA fallback.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
