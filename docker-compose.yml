services:
  db:
    image: postgres:16-alpine
    container_name: bglift-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bglift
      POSTGRES_PASSWORD: bglift
      POSTGRES_DB: bglift
    ports:
      - '5433:5432'
    volumes:
      - bglift-pgdata:/var/lib/postgresql/data

volumes:
  bglift-pgdata:
